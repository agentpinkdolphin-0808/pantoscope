# Sales Command Center — Nginx reverse proxy
# Single origin: shell at /  |  apps at /apps/<name>/
#
# Usage: nginx -c /path/to/this/nginx.conf

worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Map app path names to their local ports
    map $uri $app_port {
        ~^/apps/account-overview/    5101;
        ~^/apps/sales-history/       5102;
        ~^/apps/pipeline-management/ 5103;
        ~^/apps/reports-analytics/   5104;
        ~^/apps/team-performance/    5105;
        ~^/apps/eyecare-assistant/   5206;
        ~^/apps/route-planner/       5201;
        ~^/apps/visit-accounts/      5202;
        ~^/apps/merchandising/       5203;
        ~^/apps/surveys-feedback/    5204;
        ~^/apps/orders-invoices/     5205;
        default 0;
    }

    server {
        listen 80;
        server_name localhost;

        # -- Shell (Flask on 5000) --
        location / {
            proxy_pass         http://127.0.0.1:5000;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   Cookie $http_cookie;
        }

        # -- Apps: forward to their ports, inject session user header --
        # The shell's Flask session cookie is read-through so each app
        # can trust X-SCC-User set here (only for internal routing).
        location ~ ^/apps/([^/]+)/(.*)$ {
            # Reject if no app port matched (prevents routing to port 0)
            if ($app_port = "0") {
                return 404;
            }

            rewrite ^/apps/[^/]+/(.*)$ /$1 break;

            proxy_pass         http://127.0.0.1:$app_port;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   Cookie $http_cookie;

            # Session user injected for apps to read — set by shell's auth
            # Apps should verify this header only comes from trusted proxy.
            proxy_set_header   X-SCC-User $cookie_session;

            # WebSocket support (future apps may use it)
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";

            # Keep app iframes alive — generous timeouts
            proxy_read_timeout    300s;
            proxy_send_timeout    300s;
            proxy_connect_timeout 10s;
        }
    }
}
