<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ app.title }}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0c11;
      color: #e8eaf0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 16px;
      text-align: center;
      padding: 40px;
    }
    .badge {
      display: inline-block;
      background: rgba(59,130,246,0.15);
      border: 1px solid rgba(59,130,246,0.3);
      color: #60a5fa;
      border-radius: 6px;
      padding: 4px 12px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    h1 { font-size: 1.5rem; font-weight: 600; }
    p  { font-size: 0.9rem; color: #8892a4; max-width: 400px; line-height: 1.6; }
    .meta {
      font-size: 0.78rem;
      color: #4a5568;
      background: #161b27;
      border: 1px solid #1e2537;
      border-radius: 8px;
      padding: 10px 18px;
    }
  </style>
</head>
<body>
  <span class="badge">App Placeholder</span>
  <h1>{{ app.title }}</h1>
  <p>{{ app.subtitle }}</p>
  <div class="meta">
    Port: {{ app.port }} &nbsp;|&nbsp; Path: /apps/{{ app.path }}/ &nbsp;|&nbsp; User: {{ user.username }}
  </div>
  <p style="font-size:0.8rem;">
    This placeholder loads when the app's local service isn't running.<br>
    Start the app on port {{ app.port }} and this iframe will serve it live.
  </p>
</body>
</html>
