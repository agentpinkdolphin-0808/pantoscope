<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pantoscope — Sign In</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/static/branding/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/static/branding/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/static/branding/apple-touch-icon.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0c11;
      --surface: #0f1219;
      --surface2: #161b27;
      --border: #1e2537;
      --text: #e8eaf0;
      --text-dim: #8892a4;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --error: #ef4444;
      --green: #22c55e;
    }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-wrap {
      width: 100%;
      max-width: 400px;
      padding: 2rem;
    }
    .logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-bottom: 2rem;
      text-align: center;
    }
    .logo-image {
      width: 240px;
      height: auto;
      border-radius: 24px;
    }
    .logo-text {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.2;
    }
    .logo-text span {
      display: block;
      font-size: 0.75rem;
      font-weight: 400;
      color: var(--text-dim);
      margin-top: 2px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
    }
    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    .subtitle {
      font-size: 0.85rem;
      color: var(--text-dim);
      margin-bottom: 1.75rem;
    }
    .field {
      margin-bottom: 1.1rem;
    }
    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-dim);
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.65rem 0.9rem;
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: var(--accent); }
    .error-msg {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: var(--error);
      border-radius: 8px;
      padding: 0.65rem 0.9rem;
      font-size: 0.85rem;
      margin-bottom: 1rem;
    }
    button {
      width: 100%;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 0.75rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.15s;
    }
    button:hover { background: var(--accent-hover); }
    .footer-note {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: var(--text-dim);
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="logo">
      <img class="logo-image" src="/static/branding/pantoscope-logo.png" alt="Pantoscope">
      <div class="logo-text">
        Pantoscope
        <span>See everything.</span>
      </div>
    </div>
    <div class="card">
      <h1>Welcome back</h1>
      <p class="subtitle">Sign in to your account to continue.</p>
      {% if error %}
      <div class="error-msg">{{ error }}</div>
      {% endif %}
      <form method="POST">
        {% if request.args.get('next') %}
        <input type="hidden" name="next" value="{{ request.args.get('next') }}">
        {% endif %}
        <div class="field">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" autocomplete="username"
                 placeholder="Enter your username" required autofocus>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" autocomplete="current-password"
                 placeholder="Enter your password" required>
        </div>
        <button type="submit">Sign In</button>
      </form>
    </div>
    <p class="footer-note">Pantoscope &mdash; Internal use only.</p>
  </div>
</body>
</html>
