<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eye Care Assistant</title>
  <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
  <div class="chat-wrap">
    <div class="thread" id="thread"></div>

    <form class="input-bar" id="input-form">
      <input type="text" id="message-input" class="message-input" placeholder="Send a message…" autocomplete="off">
      <button type="button" class="attach-btn" title="Attach a file (coming soon)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
        </svg>
      </button>
      <button type="submit" class="send-btn" title="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </form>
  </div>

  <script src="static/js/chat.js"></script>
</body>
</html>
